# ============================================================================
# 115 网盘配置（模板）
# 用法：复制为 config/netdisk.yml 并填入真实值。netdisk.yml 已被 .gitignore 忽略。
# ============================================================================

p115:
  # 115 网盘 Cookie（必需）
  # 说明：用于认证 115 网盘账号
  # 格式：UID=...; CID=...; SEID=...
  # 获取方式：
  #   1. 登录 115.com
  #   2. 打开浏览器开发者工具（F12）
  #   3. 在 Network 标签中找到任意请求
  #   4. 复制 Cookie 请求头的值
  cookies: ""

  # 是否确保 Cookie 有效性（可选，默认 false）
  # 说明：启用后会在每次请求前验证 Cookie 是否有效
  # 注意：会增加额外的 API 请求
  ensure_cookies: false

  # 缓存目录（可选，默认 .p115client.cache.d）
  # 说明：p115client 库的缓存目录，用于存储临时数据
  # 建议：使用相对路径，避免权限问题
  cache_home: ".p115client.cache.d"

  # 中转目录 CID（可选）
  # 说明：用于存放从分享链接转存的待整理文件
  # 获取方式：在 115 网盘中创建一个文件夹，URL 中的数字即为 CID
  # 示例：https://115.com/?cid=123456 中的 123456
  transfer_cid: 0

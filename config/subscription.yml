# ============================================================================
# 订阅规则配置
# ============================================================================

subscription:
  # 是否启用自动订阅处理（可选，默认 false）
  # 说明：启用后会定期扫描采集队列，匹配订阅规则并转存文件
  # 注意：需要配置 transfer_cid
  auto_process: true

  # 处理间隔（秒）（可选，默认 60）
  # 说明：自动处理的扫描间隔时间
  # 建议：根据采集频率调整，采集频繁时可适当减少间隔
  interval_seconds: 60

  # 每次处理的最大项目数（可选，默认 10）
  # 说明：每次扫描处理的最大采集项目数
  # 建议：避免单次处理过多导致超时，可根据服务器性能调整
  max_items_per_tick: 10

  # 默认订阅规则（可选）
  # 说明：这里可以预定义一些常用的订阅规则
  # 注意：实际订阅规则存储在数据库中，这里仅作为示例
  # 通过 API 或 CLI 创建的订阅规则会保存到数据库
  default_rules: []
    # 示例：
    # - name: "4K 电影"
    #   pattern: "2160p|4K"
    #   enabled: true
    # - name: "1080P 剧集"
    #   pattern: "1080p.*S\\d+E\\d+"
    #   enabled: true

# ============================================================================
# 文件整理配置
# ============================================================================

organize:
  # 媒体库根目录 CID（必需）
  # 说明：整理后的文件会按分类存放在此目录下
  # 目录结构：<根目录>/<分类>/<地区>/<标题（年份）{tmdb-id}>/<文件>
  # 分类包括：电影、剧集、动画、综艺、纪录片
  # 获取方式：在 115 网盘中创建媒体库文件夹，URL 中的数字即为 CID
  media_library_root_cid: 3438323979204036114

  # 是否启用自动整理（可选，默认 false）
  # 说明：启用后会定期扫描中转目录并自动整理文件
  # 注意：需要配置 transfer_cid 和 media_library_root_cid
  auto_organize: true

  # 整理间隔（秒）（可选，默认 300）
  # 说明：自动整理的扫描间隔时间
  # 建议：根据文件数量调整，文件多时可适当增加间隔
  interval_seconds: 600

  # 重复文件处理策略（可选，默认 keep_larger）
  # 说明：当目标目录已存在同名文件时的处理方式
  # 选项：
  #   - keep_larger: 保留较大的文件（删除较小的）
  #   - skip: 跳过新文件，保留已存在的文件
  #   - overwrite: 覆盖已存在的文件
  duplicate_strategy: "keep_larger"

  # TMDB 解析失败处理（可选，默认 keep_in_staging）
  # 说明：当无法从 TMDB 获取元数据时的处理方式
  # 选项：
  #   - keep_in_staging: 留在中转目录，等待手动处理
  #   - move_to_unknown: 移动到"未识别"目录
  unmatched_strategy: "keep_in_staging"

  # 单文件整理之间的最小间隔（秒）（可选，默认 0.5）
  # 说明：每处理完一个文件后等待的时间，用于规避 115 网盘的 QPS 限制
  # 建议：文件较多或遇到限流时可适当调大（如 1.0~2.0）
  min_interval_seconds: 0.5

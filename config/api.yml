# ============================================================================
# API 服务配置
# ============================================================================

api:
  # CORS 允许的源（可选）
  # 说明：配置允许跨域访问的前端地址
  # 格式：多个源用逗号分隔
  # 示例：http://localhost:5173,http://127.0.0.1:5173,https://your-domain.com
  # 注意：生产环境应限制为实际的前端域名
  cors_origins: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:5177,http://127.0.0.1:5177"

  # API 服务端口（可选，默认 8000）
  # 说明：FastAPI 服务监听的端口
  # 建议：避免与其他服务冲突
  port: 8000

  # API 服务主机（可选，默认 0.0.0.0）
  # 说明：FastAPI 服务绑定的主机地址
  # 选项：
  #   - 0.0.0.0: 监听所有网络接口（允许外部访问）
  #   - 127.0.0.1: 仅监听本地回环（仅本机访问）
  # 注意：生产环境建议使用反向代理（如 Nginx）
  host: "0.0.0.0"

  # API 文档路径（可选，默认 /docs）
  # 说明：Swagger UI 文档的访问路径
  # 设置为 null 可禁用文档
  docs_url: "/docs"

  # ReDoc 文档路径（可选，默认 /redoc）
  # 说明：ReDoc 文档的访问路径
  # 设置为 null 可禁用文档
  redoc_url: "/redoc"

  # 日志级别（可选，默认 info）
  # 说明：API 服务的日志输出级别
  # 选项：debug, info, warning, error, critical
  log_level: "info"

  # 是否启用热重载（可选，默认 false）
  # 说明：开发模式下自动重载代码变更
  # 注意：仅用于开发环境，生产环境应设为 false
  reload: false

# ============================================================================
# TMDB API 配置（模板）
# 用法：复制为 config/tmdb.yml 并填入真实值。tmdb.yml 已被 .gitignore 忽略。
# ============================================================================

tmdb:
  # TMDB Bearer Token（必需）
  # 说明：用于访问 TMDB API 获取影视元数据
  # 获取方式：
  #   1. 注册 TMDB 账号：https://www.themoviedb.org/signup
  #   2. 进入 API 设置页面：https://www.themoviedb.org/settings/api
  #   3. 申请 API Key（选择 Developer 类型）
  #   4. 复制 "API Read Access Token (v4 auth)" 的值
  bearer_token: ""

  # 查询语言（可选，默认 zh-CN）
  # 说明：TMDB API 返回的元数据语言
  # 支持的语言代码：
  #   - zh-CN: 简体中文
  #   - zh-TW: 繁体中文
  #   - en-US: 英语
  #   - ja-JP: 日语
  #   - ko-KR: 韩语
  # 完整列表：https://developers.themoviedb.org/3/configuration/get-primary-translations
  language: "zh-CN"
